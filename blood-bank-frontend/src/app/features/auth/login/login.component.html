<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-sm border border-gray-200 p-8">
    <div class="flex flex-col items-center mb-8">
      <span class="material-symbols-outlined text-5xl text-red-600 mb-2" style="font-variation-settings: 'FILL' 1">bloodtype</span>
      <h1 class="text-2xl font-bold text-red-600">LifeFlow</h1>
      <p class="text-gray-500 text-sm mt-1">Connexion</p>
    </div>
    @if (error) {
      <div class="mb-4 p-3 rounded-lg bg-red-50 text-red-700 text-sm">{{ error }}</div>
    }
    <form [formGroup]="form" class="space-y-4" (ngSubmit)="submit()">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-red-500 focus:border-transparent"
          placeholder="vous@exemple.com"
          autocomplete="email"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <p class="text-red-600 text-xs mt-1">Email invalide</p>
        }
      </div>
      <div>
        <label for="motDePasse" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input
          id="motDePasse"
          type="password"
          formControlName="motDePasse"
          class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-red-500 focus:border-transparent"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        @if (form.get('motDePasse')?.invalid && form.get('motDePasse')?.touched) {
          <p class="text-red-600 text-xs mt-1">Minimum 6 caractères</p>
        }
      </div>
      <button
        type="button"
        (click)="submit()"
        [disabled]="loading"
        class="w-full py-2.5 rounded-lg bg-red-600 text-white font-medium hover:bg-red-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>
    <p class="mt-6 text-center text-sm text-gray-500">
      Pas de compte ?
      <a routerLink="/auth/register" class="text-red-600 font-medium hover:underline">S'inscrire</a>
    </p>
  </div>
</div>
