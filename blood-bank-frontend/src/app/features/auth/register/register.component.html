<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-sm border border-gray-200 p-8">
    <div class="flex flex-col items-center mb-8">
      <span class="material-symbols-outlined text-5xl text-red-600 mb-2" style="font-variation-settings: 'FILL' 1">bloodtype</span>
      <h1 class="text-2xl font-bold text-red-600">LifeFlow</h1>
      <p class="text-gray-500 text-sm mt-1">Inscription</p>
    </div>
    @if (error) {
      <div class="mb-4 p-3 rounded-lg bg-red-50 text-red-700 text-sm">{{ error }}</div>
    }
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="prenom" class="block text-sm font-medium text-gray-700 mb-1">Prénom</label>
          <input id="prenom" type="text" formControlName="prenom" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-red-500" />
        </div>
        <div>
          <label for="nom" class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
          <input id="nom" type="text" formControlName="nom" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-red-500" />
        </div>
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input id="email" type="email" formControlName="email" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-red-500" />
      </div>
      <div>
        <label for="telephone" class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label>
        <input id="telephone" type="tel" formControlName="telephone" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-red-500" />
      </div>
      <div>
        <label for="motDePasse" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input id="motDePasse" type="password" formControlName="motDePasse" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-red-500" />
        @if (form.get('motDePasse')?.invalid && form.get('motDePasse')?.touched) {
          <p class="text-red-600 text-xs mt-1">Minimum 6 caractères</p>
        }
      </div>
      <div>
        <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Rôle</label>
        <select id="role" formControlName="role" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-red-500">
          <option value="USER">Donneur / Patient</option>
          <option value="ADMIN">Admin (hôpital)</option>
          <option value="SUPER_ADMIN">Super Admin</option>
        </select>
      </div>
      @if (isAdmin) {
        <div>
          <label for="hopitalId" class="block text-sm font-medium text-gray-700 mb-1">Hôpital</label>
          <select id="hopitalId" formControlName="hopitalId" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-red-500">
            <option [ngValue]="null">Sélectionner un hôpital</option>
            @for (h of hopitaux(); track h.id) {
              <option [ngValue]="h.id">{{ h.nom }} ({{ h.ville }})</option>
            }
          </select>
        </div>
      }
      <button
        type="submit"
        [disabled]="loading"
        class="w-full py-2.5 rounded-lg bg-red-600 text-white font-medium hover:bg-red-700 transition-colors disabled:opacity-50"
      >
        {{ loading ? 'Inscription...' : "S'inscrire" }}
      </button>
    </form>
    <p class="mt-6 text-center text-sm text-gray-500">
      Déjà un compte ?
      <a routerLink="/auth/login" class="text-red-600 font-medium hover:underline">Se connecter</a>
    </p>
  </div>
</div>
