# Load .env variables if present (Spring Boot 3.1+)
spring.config.import=optional:dotenv:

# Configuration du serveur
server.port=${SERVER_PORT:8080}
spring.application.name=blood-bank-system

# Configuration MariaDB
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/bks?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kali}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# JPA/Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
# JWT Configuration
jwt.secret=${JWT_SECRET:VotreCleSuperSecreteIciPourJWTTokenQuiDoitEtreTresLongueEtSecurisee2024}
jwt.expiration=${JWT_EXPIRATION:86400000}
# Configuration Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Configuration CORS
cors.allowed-origins=http://localhost:4200,http://localhost:3000,http://localhost:8080
# Configuration Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Configuration Logs
logging.level.com.bks=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
# Configuration Timezone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Configuration Scheduled Tasks
spring.task.scheduling.pool.size=5
# Chatbot Configuration - Groq API (GRATUIT)
chatbot.ai.enabled=true
chatbot.ai.provider=groq
chatbot.ai.api-key=${GROQ_API_KEY:}
chatbot.ai.model=llama-3.3-70b-versatile
chatbot.ai.api-url=https://api.groq.com/openai/v1/chat/completions